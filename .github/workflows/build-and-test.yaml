name: build-and-test

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

jobs:
  build_and_test:
    runs-on: self-hosted
    steps:
      - name: Compute Vars
        id: vars
        run: |
          echo "image_tag=${{ github.repository }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build image
        run: |
          docker build -t ${{ steps.vars.outputs.image_tag }} .
          docker build -t ${{ steps.vars.outputs.image_tag }}-vla --build-arg COSMOS_RL_EXTRAS=vla,wfm,rl .

      - name: Run vla tests
        id: vla-tests
        run: |
          set -ex

          container_id=$(docker run -t -d --rm \
            --gpus all \
            --shm-size=24G \
            -v ${{ github.workspace }}/tests:/workspace/cosmos-rl/tests:ro \
            -v ${{ github.workspace }}/configs:/workspace/cosmos-rl/configs:ro \
            -v /tmp/cache:/root/.cache \
            -e PYTHONPYCACHEPREFIX=/tmp/pycache \
            -w /workspace/cosmos-rl \
            ${{ steps.vars.outputs.image_tag }}-vla /bin/bash)

          echo "container_id=${container_id}" >> $GITHUB_OUTPUT
          DOCKER_RUN="timeout 10m docker exec ${container_id}"
          # ${DOCKER_RUN} python tests/test_env_manager_libero.py
          # ${DOCKER_RUN} python tests/test_env_manager_maniskill.py
          # ${DOCKER_RUN} ROBOTWIN_PATH=/RoboTwin python tests/test_env_manager_robotwin.py
          # ${DOCKER_RUN} python tests/test_vla_libero.py --config configs/openvla-oft/openvla-oft-libero10-eval.toml --trials 50 --task-ids 0
          # ${DOCKER_RUN} python tests/test_vla_libero.py --config configs/cosmos-policy/cosmos-policy-libero10-eval.toml --trials 50 --task-ids 0
          # ${DOCKER_RUN} python tests/test_vla_libero.py --config configs/pi05/pi05-libero10-eval.toml --trials 50 --task-ids 0


      - name: Run tests
        id: tests
        run: |
          set -ex

          container_id=$(docker run -t -d --rm \
            --gpus all \
            --shm-size=24G \
            -v ${{ github.workspace }}/tests:/workspace/cosmos-rl/tests:ro \
            -v /tmp/cache:/root/.cache \
            -e PYTHONPYCACHEPREFIX=/tmp/pycache \
            -w /workspace/cosmos-rl \
            ${{ steps.vars.outputs.image_tag }} /bin/bash)

          echo "container_id=${container_id}" >> $GITHUB_OUTPUT
          DOCKER_RUN="timeout 2h docker exec ${container_id}"
          # run test script
          ${DOCKER_RUN} bash tests/run_test.sh

      - name: Cleanup
        if: always()
        run: |
          docker stop "${{ steps.tests.outputs.container_id }}" || true
          docker stop "${{ steps.vla-tests.outputs.container_id }}" || true
          docker rmi -f "${{ steps.vars.outputs.image_tag }}" || true
          docker rmi -f "${{ steps.vars.outputs.image_tag }}-vla" || true
